name: Opportunity Scanner

on:
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SCANNER_MODEL: "claude-haiku-4-5-20251001"
          MAX_SEARCHES: "8"
        run: python scanner.py

      - name: Commit updated memory
        run: |
          git config user.name "Opportunity Scanner Bot"
          git config user.email "scanner@bot.local"
          git add data/seen.json || true
          git diff --cached --quiet || git commit -m "Update seen opportunities"
          git push || true
